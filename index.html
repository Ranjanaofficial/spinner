<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinner</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
            box-sizing: border-box;
        }

        body{
            background-color: rgb(111, 55, 240);
            width: 100vw;
            height: 100vh;
            display: grid;
            place-content: center;
        }
       
        div{
            background-color: white;
            padding: 60px;
            width: 350px;
            text-align: center;
            border-radius: 20px;
        }
        img{
            width: 200px;        
            margin-bottom: 50px;
        }
        .active {
            animation: rotate 0.4s linear infinite;
        }
        button{
            background-color: green;
            padding: 15px;
            width: 50%;
        }
        @keyframes rotate{
            from{
                transform: rotate(0deg);
            }
            to{
                transform: rotate(360deg);
            }
        }

    </style>
</head>
<body>
    <div>
        <img id="spinner" src="images.jpg" alt="">
        <button id="btn" onclick="control()"> START </button>

        <script>
            let spinner = document.getElementById('spinner');
            let btn = document.getElementById('btn');
            let status = false;

            function control(){

                if(status==false){
                    spinner.setAttribute('class','active');
                    status = true;
                    btn.innerHTML = "STOP";
                }
                else{
                    spinner.removeAttribute('class');
                    status = false;
                    btn.innerHTML = "START";
                }
                
            }
        </script>
    </div>
</body>
</html>
